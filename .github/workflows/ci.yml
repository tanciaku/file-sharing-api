name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Build
        run: cargo build --verbose
      
      - name: Run tests
        run: cargo test --verbose